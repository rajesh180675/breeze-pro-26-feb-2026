name: Breeze PRO CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Packaging smoke test
        run: python -c "import app.api.main"
      - name: Lint (ruff)
        run: ruff check . --select E,F,W,I,N
      - name: Format check (ruff format)
        run: ruff format --check .
      - name: Security scan (bandit)
        run: bandit -q -r . -x tests/,./data/
      - name: Type check (mypy)
        run: mypy app/lib/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Unit tests + coverage
        run: pytest tests/unit/ --cov=app/lib --cov-report=xml --cov-fail-under=80
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t breeze-pro:${{ github.sha }} .
      - name: Run container healthcheck
        run: |
          docker run -d --name test-container -p 8000:8000 breeze-pro:${{ github.sha }}
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/healthz > /dev/null; then
              echo "Healthcheck passed"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Healthcheck failed after retries"
              docker logs test-container || true
              exit 1
            fi
            sleep 2
          done
          docker stop test-container
