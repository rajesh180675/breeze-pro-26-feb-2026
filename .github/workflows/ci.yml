name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          ruff check .
          flake8 app tests
      - name: Unit tests
        run: pytest tests/unit --cov=app/lib --cov-report=term-missing --cov-fail-under=80
      - name: Security scan
        run: bandit -q -r app
      - name: Build Docker image
        run: docker build -t breeze-service:${{ github.sha }} .
      - name: Integration tests (optional)
        if: ${{ secrets.BREEZE_CLIENT_ID != '' && secrets.BREEZE_CLIENT_SECRET != '' && secrets.BREEZE_SESSION_TOKEN != '' }}
        env:
          BREEZE_CLIENT_ID: ${{ secrets.BREEZE_CLIENT_ID }}
          BREEZE_CLIENT_SECRET: ${{ secrets.BREEZE_CLIENT_SECRET }}
          BREEZE_SESSION_TOKEN: ${{ secrets.BREEZE_SESSION_TOKEN }}
        run: pytest tests/integration -m integration
