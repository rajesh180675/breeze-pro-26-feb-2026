apiVersion: apps/v1
kind: Deployment
metadata:
  name: breeze-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: breeze-service
  template:
    metadata:
      labels:
        app: breeze-service
    spec:
      containers:
        - name: breeze-service
          image: breeze-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: breeze-service-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: breeze-service
spec:
  selector:
    app: breeze-service
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: breeze-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: breeze-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: breeze-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: breeze-service
