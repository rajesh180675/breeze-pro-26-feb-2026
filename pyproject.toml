[tool.ruff]
line-length = 120
# Exclude legacy root-level Streamlit files from ruff checks;
# they are not part of the production app/ package and are too large to lint-fix safely.
exclude = [
    "app.py",
    "analytics.py",
    "breeze_api.py",
    "helpers.py",
    "session_manager.py",
    "live_feed.py",
    "gtt_manager.py",
    "holiday_calendar.py",
    "persistence.py",
    "risk_monitor.py",
    "strategies.py",
    "ta_indicators.py",
    "futures.py",
    "historical.py",
    "alerting.py",
    "charts.py",
    "paper_trading.py",
    "basket_orders.py",
    "validators.py",
    "app_config.py",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E402"]
"tests/conftest.py" = ["E402"]

[tool.ruff.format]
# Ruff format also respects the top-level exclude list above.
# Legacy root files are excluded from format checks too.
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict_optional = true
warn_return_any = false
warn_unused_ignores = false
# Type-check the production package rather than only legacy compatibility shims.
files = ["app/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
